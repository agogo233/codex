name: Compile Linux amd64

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      lto:
        description: "LTO mode"
        required: false
        default: "thin"
        type: choice
        options:
          - "thin"
          - "fat"
          - "off"

env:
  CARGO_PROFILE_RELEASE_LTO: ${{ inputs.lto || 'thin' }}
  CARGO_INCREMENTAL: 0

jobs:
  compile-linux-amd64:
    name: Compile Linux amd64
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: read
    defaults:
      run:
        working-directory: codex-rs

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Free disk space
        run: |
          set -euo pipefail
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup /usr/local/share/boost
          sudo apt-get clean
          df -h .

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('codex-rs/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@a0b273b48ed29de4470960879e8381ff45632f26 # 1.93.0
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.14.0

      - name: Install musl build tools
        env:
          TARGET: x86_64-unknown-linux-musl
          GITHUB_ENV: ${{ runner.temp }}/github-env.txt
        run: |
          touch "${GITHUB_ENV}"
          bash "${GITHUB_WORKSPACE}/.github/scripts/install-musl-build-tools.sh"

      - name: Configure rustc flags (musl)
        env:
          TARGET: x86_64-unknown-linux-musl
        shell: bash
        run: |
          set -euo pipefail
          
          unset RUSTFLAGS CARGO_ENCODED_RUSTFLAGS CARGO_BUILD_RUSTFLAGS
          unset CFLAGS CXXFLAGS ASAN_OPTIONS UBSAN_OPTIONS
          
          target_upper="${TARGET^^}"
          target_upper_underscore="${target_upper//-/_}"
          
          echo "CFLAGS=" >> "$GITHUB_ENV"
          echo "CXXFLAGS=" >> "$GITHUB_ENV"
          echo "CMAKE_C_FLAGS=" >> "$GITHUB_ENV"
          echo "CMAKE_CXX_FLAGS=" >> "$GITHUB_ENV"
          echo "${target_upper_underscore}_CFLAGS=" >> "$GITHUB_ENV"
          echo "${target_upper_underscore}_CXXFLAGS=" >> "$GITHUB_ENV"
          
          echo "AWS_LC_SYS_NO_JITTER_ENTROPY=1" >> "$GITHUB_ENV"
          echo "AWS_LC_SYS_NO_JITTER_ENTROPY_${target_upper_underscore}=1" >> "$GITHUB_ENV"
          echo "RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_ENCODED_RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "RUSTDOCFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_BUILD_RUSTFLAGS=" >> "$GITHUB_ENV"

      - name: Configure rustc UBSan wrapper (musl host)
        shell: bash
        run: |
          set -euo pipefail
          ubsan_path="$(ldconfig -p 2>/dev/null | grep -m1 'libubsan\.so\.1' | sed -E 's/.*=> (.*)$/\1/')"
          if [[ -z "${ubsan_path}" ]]; then
            echo "Warning: libubsan.so.1 not found on host; UBSan wrapper will not preload it" >&2
          fi
          wrapper_root="${RUNNER_TEMP:-/tmp}"
          wrapper="${wrapper_root}/rustc-ubsan-wrapper"
          printf '#!/usr/bin/env bash\nset -euo pipefail\nif [[ -n "%s" ]]; then\n  export LD_PRELOAD="%s${LD_PRELOAD:+:${LD_PRELOAD}}"\nfi\nexec "$1" "${@:2}"\n' \
            "${ubsan_path}" "${ubsan_path}" > "${wrapper}"
          chmod +x "${wrapper}"
          echo "RUSTC_WRAPPER=${wrapper}" >> "$GITHUB_ENV"
          echo "RUSTC_WORKSPACE_WRAPPER=" >> "$GITHUB_ENV"

      - name: Configure musl rusty_v8 artifact overrides
        uses: ./.github/actions/setup-rusty-v8-musl
        with:
          target: x86_64-unknown-linux-musl

      - name: Cargo build (Linux amd64)
        shell: bash
        run: |
          set -euo pipefail
          target="x86_64-unknown-linux-musl"
          
          echo "::group::Build Configuration"
          echo "Target: ${target}"
          echo "LTO: ${CARGO_PROFILE_RELEASE_LTO}"
          echo "Rust version: $(rustc --version)"
          echo "Zig version: $(zig version)"
          echo "Disk before build:"
          df -h .
          echo "::endgroup::"
          
          cargo_config="${CARGO_HOME}/config.toml"
          {
            echo "[target.${target}]"
            echo "rustflags = ['-C', 'link-arg=-nostartfiles', '-C', 'link-arg=-nodefaultlibs', '-C', 'link-arg=-lc']"
          } >> "$cargo_config"
          
          cargo build --target "$target" --release \
            --bin codex \
            --bin codex-responses-api-proxy \
            --bin codex-app-server \
            --bin bwrap
          
          echo "::group::Disk after build"
          df -h .
          echo "::endgroup::"

      - name: Verify binaries
        shell: bash
        run: |
          set -euo pipefail
          target="x86_64-unknown-linux-musl"
          binaries=("codex" "codex-responses-api-proxy" "codex-app-server" "bwrap")

          for binary in "${binaries[@]}"; do
            path="target/${target}/release/${binary}"
            if [[ ! -f "$path" ]]; then
              echo "::error::${path} not found"
              exit 1
            fi
            echo "Binary: ${binary}"
            file "$path"
            ls -lh "$path"
          done

      - name: Create archive
        shell: bash
        run: |
          set -euo pipefail
          target="x86_64-unknown-linux-musl"
          release_dir="target/${target}/release"
          bundle_dir="${RUNNER_TEMP}/codex-linux-amd64"

          rm -rf "$bundle_dir"
          mkdir -p "$bundle_dir/codex-resources"

          cp "$release_dir/codex" "$bundle_dir/codex"
          cp "$release_dir/codex-responses-api-proxy" "$bundle_dir/codex-responses-api-proxy"
          cp "$release_dir/codex-app-server" "$bundle_dir/codex-app-server"
          cp "$release_dir/bwrap" "$bundle_dir/codex-resources/bwrap"

          chmod +x "$bundle_dir/codex" "$bundle_dir/codex-responses-api-proxy" "$bundle_dir/codex-app-server" "$bundle_dir/codex-resources/bwrap"

          tar -C "$(dirname "$bundle_dir")" -czf "${RUNNER_TEMP}/codex-linux-amd64-bundle.tar.gz" "$(basename "$bundle_dir")"

          rm -rf "$bundle_dir"

          echo "Created bundle:"
          ls -lh "${RUNNER_TEMP}/codex-linux-amd64-bundle.tar.gz"
          echo "Bundle contents:"
          tar -tzf "${RUNNER_TEMP}/codex-linux-amd64-bundle.tar.gz"

      - name: Upload artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: linux-amd64-binaries
          path: |
            ${{ runner.temp }}/codex-linux-amd64-bundle.tar.gz
          if-no-files-found: error
          retention-days: 30
