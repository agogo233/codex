name: Compile Linux amd64

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      lto:
        description: "LTO mode"
        required: false
        default: "thin"
        type: choice
        options:
          - "thin"
          - "fat"
          - "off"

env:
  CARGO_PROFILE_RELEASE_LTO: ${{ inputs.lto || 'thin' }}
  RUSTFLAGS: ""
  CARGO_ENCODED_RUSTFLAGS: ""
  CARGO_BUILD_RUSTFLAGS: ""
  CFLAGS: ""
  CXXFLAGS: ""
  ASAN_OPTIONS: ""
  UBSAN_OPTIONS: ""

jobs:
  compile-linux-amd64:
    name: Compile Linux amd64
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    permissions:
      contents: read
    defaults:
      run:
        working-directory: codex-rs

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Print runner specs
        shell: bash
        run: |
          set -euo pipefail
          cpu_model="$(lscpu | awk -F: '/Model name/ {gsub(/^[ \t]+/, "", $2); print $2; exit}')"
          total_ram="$(awk '/MemTotal/ {printf "%.1f GiB\n", $2 / 1024 / 1024}' /proc/meminfo)"
          echo "Runner: ${RUNNER_NAME:-unknown}"
          echo "OS: $(uname -a)"
          echo "CPU model: ${cpu_model}"
          echo "Logical CPUs: $(nproc)"
          echo "Total RAM: ${total_ram}"
          echo "Disk usage:"
          df -h .

      - name: Install Linux build dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            pkg-config \
            libcap-dev

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@a0b273b48ed29de4470960879e8381ff45632f26 # 1.93.0
        with:
          targets: x86_64-unknown-linux-musl

      - name: Use hermetic Cargo home (musl)
        shell: bash
        run: |
          set -euo pipefail
          cargo_home="${GITHUB_WORKSPACE}/.cargo-home"
          mkdir -p "${cargo_home}/bin"
          echo "CARGO_HOME=${cargo_home}" >> "$GITHUB_ENV"
          echo "${cargo_home}/bin" >> "$GITHUB_PATH"
          : > "${cargo_home}/config.toml"

      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.14.0

      - name: Install musl build tools
        env:
          TARGET: x86_64-unknown-linux-musl
        run: bash "${GITHUB_WORKSPACE}/.github/scripts/install-musl-build-tools.sh"

      - name: Configure rustc flags (musl)
        env:
          TARGET: x86_64-unknown-linux-musl
        shell: bash
        run: |
          set -euo pipefail

          # CI runner rustc may inherit UBSan from the environment.
          # We must prevent proc-macro crates (e.g. sqlx-macros) from linking ubsan.
          unset RUSTFLAGS CARGO_ENCODED_RUSTFLAGS CARGO_BUILD_RUSTFLAGS CFLAGS CXXFLAGS ASAN_OPTIONS UBSAN_OPTIONS

          target_upper="${TARGET^^}"
          target_upper_underscore="${target_upper//-/_}"

          # Override CFLAGS/CXXFLAGS on GITHUB_ENV to block any inherited sanitizer flags
          echo "CFLAGS=" >> "$GITHUB_ENV"
          echo "CXXFLAGS=" >> "$GITHUB_ENV"
          echo "CMAKE_C_FLAGS=" >> "$GITHUB_ENV"
          echo "CMAKE_CXX_FLAGS=" >> "$GITHUB_ENV"
          echo "${target_upper_underscore}_CFLAGS=" >> "$GITHUB_ENV"
          echo "${target_upper_underscore}_CXXFLAGS=" >> "$GITHUB_ENV"

          echo "AWS_LC_SYS_NO_JITTER_ENTROPY=1" >> "$GITHUB_ENV"
          echo "AWS_LC_SYS_NO_JITTER_ENTROPY_x86_64_unknown_linux_musl=1" >> "$GITHUB_ENV"
          echo "RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_ENCODED_RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "RUSTDOCFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_BUILD_RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "${target_upper_underscore}_RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_${target_upper_underscore}_RUSTFLAGS=" >> "$GITHUB_ENV"

      - name: Configure musl rusty_v8 artifact overrides
        uses: ./.github/actions/setup-rusty-v8-musl
        with:
          target: x86_64-unknown-linux-musl

      - name: Cargo build (Linux amd64)
        shell: bash
        run: |
          set -euo pipefail
          target="x86_64-unknown-linux-musl"
          binaries=(
            "codex"
            "codex-responses-api-proxy"
            "codex-app-server"
            "bwrap"
          )

          build_args=()
          for binary in "${binaries[@]}"; do
            build_args+=(--bin "$binary")
          done

          # Inject per-target rustflags via --config to override any inherited sanitizer flags.
          # The CI runner environment may have UBSan enabled; with musl target, proc-macro .so
          # files crash at load with "undefined symbol: __ubsan_handle_*".
          cargo_build_args=(
            --target "$target"
            --release
            "${build_args[@]}"
          )

          echo "CARGO_PROFILE_RELEASE_LTO: ${CARGO_PROFILE_RELEASE_LTO}"
          echo "RUSTFLAGS env: '${RUSTFLAGS:-}'"
          echo "CARGO_ENCODED_RUSTFLAGS env: '${CARGO_ENCODED_RUSTFLAGS:-}'"

          # Write per-target rustflags to cargo config to block any inherited UBSan flags.
          # With musl target, proc-macro .so files cannot link libclang_rt.ubsan_standalone.
          # This causes "undefined symbol: __ubsan_handle_*" at proc-macro load time, which
          # breaks all downstream code that relies on those expanded macros.
          target_upper="${target^^}"
          target_underscore="${target_upper//-/_}"
          cargo_config="${CARGO_HOME}/config.toml"
          {
            echo "[target.${target}]"
            echo "rustflags = ['-C', 'link-arg=-nostartfiles', '-C', 'link-arg=-nodefaultlibs', '-C', 'link-arg=-lc']"
          } >> "$cargo_config"

          cargo build "${cargo_build_args[@]}"

      - name: Verify binaries
        shell: bash
        run: |
          set -euo pipefail
          target="x86_64-unknown-linux-musl"
          binaries=(
            "codex"
            "codex-responses-api-proxy"
            "codex-app-server"
            "bwrap"
          )

          for binary in "${binaries[@]}"; do
            path="target/${target}/release/${binary}"
            if [[ ! -f "$path" ]]; then
              echo "Error: ${path} not found"
              exit 1
            fi
            ls -lh "$path"
          done

      - name: Stage artifacts
        shell: bash
        run: |
          set -euo pipefail
          target="x86_64-unknown-linux-musl"
          dest="dist/${target}"
          mkdir -p "$dest/codex-resources"

          # Main binaries and server go to root
          for binary in "codex" "codex-responses-api-proxy" "codex-app-server"; do
            src="target/${target}/release/${binary}"
            dst="${dest}/${binary}"
            cp "$src" "$dst"
            chmod +x "$dst"
          done

          # bwrap goes into codex-resources/
          src="target/${target}/release/bwrap"
          dst="${dest}/codex-resources/bwrap"
          cp "$src" "$dst"
          chmod +x "$dst"

          echo "Staged artifacts:"
          find "$dest" -type f -exec ls -lh {} \;

      - name: Create archives
        shell: bash
        run: |
          set -euo pipefail
          target="x86_64-unknown-linux-musl"
          dest="dist/${target}"
          bundle_dir="${RUNNER_TEMP}/codex-linux-amd64"

          # Create bundle directory structure
          rm -rf "$bundle_dir"
          mkdir -p "$bundle_dir/codex-resources"

          # Copy files into bundle directory (keeping correct structure)
          cp "$dest/codex" "$bundle_dir/codex"
          cp "$dest/codex-responses-api-proxy" "$bundle_dir/codex-responses-api-proxy"
          cp "$dest/codex-app-server" "$bundle_dir/codex-app-server"
          cp "$dest/codex-resources/bwrap" "$bundle_dir/codex-resources/bwrap"

          # Ensure executable permissions
          chmod +x "$bundle_dir/codex" "$bundle_dir/codex-responses-api-proxy" "$bundle_dir/codex-app-server" "$bundle_dir/codex-resources/bwrap"

          # Create tarball
          tar -C "$(dirname "$bundle_dir")" -czf "$dest/codex-linux-amd64-bundle.tar.gz" "$(basename "$bundle_dir")"

          # Clean up temp directory
          rm -rf "$bundle_dir"

          echo "Created bundle:"
          ls -lh "$dest/codex-linux-amd64-bundle.tar.gz"
          echo "Bundle contents:"
          tar -tzf "$dest/codex-linux-amd64-bundle.tar.gz"

      - name: Upload artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: linux-amd64-binaries
          path: |
            codex-rs/dist/x86_64-unknown-linux-musl/*
          if-no-files-found: error
